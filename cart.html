<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>장바구니</title>
  <link rel="stylesheet" href="./assets/css/cart.css">
</head>
<body>
  <main class="cart-page">
    <h1>장바구니</h1>
    <a href="./index.html">메뉴로 돌아가기</a>

    <div class="cart-list"></div>
    <p class="cart-total">총 금액: 0원</p>

    <div class="coupon-box">
      <form class="coupon-form">
        <input 
          type="text" 
          class="coupon-input" 
          placeholder="쿠폰 코드를 입력하세요"
        >

        <button type="submit" class="coupon-btn">
          쿠폰 적용
        </button>

        <button type="button" class="coupon-cancel-btn hide">
          쿠폰 취소
        </button>
      </form>

      <p class="coupon-message"></p>
    </div>

    <p class="discount-price">할인 금액: 0원</p>
    <p class="final-price">최종 결제 금액: 0원</p>

    <button class="payment">결제</button>
  </main>

  <script src="./assets/js/config.js"></script>
  <script type="module" src="./assets/js/cartPage.js"></script>
</body>
</html>
